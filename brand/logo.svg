           A 425 425 0 0 0 480 920
           A 425 425 0 0 0 900 380"
        fill="none" stroke="#0A0A0A" stroke-width="46" stroke-linecap="round"/>

  <!-- Caule -->
  <rect x="456" y="690" width="48" height="150" rx="14" fill="#5C4A07"/>

  <!-- Folha esquerda (verde) -->
  <path d="M 110 415
           C 230 430, 350 540, 400 700
           C 410 740, 400 800, 380 830
           C 250 770, 150 640, 110 480
           C 102 452, 102 430, 110 415 Z"
