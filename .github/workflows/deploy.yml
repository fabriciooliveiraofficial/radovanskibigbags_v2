name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, xml, zip, pdo_mysql

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Composer Dependencies (Production)
        run: |
          cd loja
          composer install --no-dev --optimize-autoloader

      - name: Install NPM Dependencies & Build Assets
        run: |
          cd loja
          npm ci
          npm run build

      - name: Package Application
        run: |
          # Cria um arquivo compactado para envio super rápido via SCP
          tar -czf release.tar.gz .gitignore brand loja -X <(echo -e "loja/node_modules\nloja/vendor\nloja/tests")

      - name: Transfer Archive to Hostinger
        uses: appleboy/scp-action@master
        with:
          host: "45.145.184.127"
          port: "65002"
          username: "u714643564"
          password: ${{ secrets.SSH_PASSWORD }}
          source: "release.tar.gz"
          target: "/home/u714643564/domains/radovanskibigbags.com.br"

      - name: Extract Archive & Post-Deploy on Hostinger
        uses: appleboy/ssh-action@master
        with:
          host: "45.145.184.127"
          port: "65002"
          username: "u714643564"
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /home/u714643564/domains/radovanskibigbags.com.br
            
            # 1. Extrai o release substituindo os arquivos antigos
            tar -xzf release.tar.gz
            
            # 2. Entra na pasta do laravel
            cd loja
            
            # 3. Garante que as dependências de produção do composer foram atualizadas no servidor
            # (Elas já foram compactadas juntas no tar.gz, mas rodamos install para garantir dump-autoload correto)
            composer install --no-dev --optimize-autoloader
            
            # 4. Executa migrações do banco e otimiza cache
            php artisan migrate --force
            php artisan optimize:clear
            php artisan optimize
            php artisan filament:optimize
            
            # 5. Remove o arquivo compactado temporário
            rm ../release.tar.gz
